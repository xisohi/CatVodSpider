# .github/workflows/build.yml
name: Build and Generate Custom Spider Jar

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    # 允许手动触发

jobs:
  build:
    runs-on: windows-latest  # 使用Windows运行器
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: wrapper

    - name: Build with Gradle
      run: |
        .\gradlew.bat assembleRelease --no-daemon

    - name: Download baksmali and apktool
      run: |
        mkdir jar\3rd 2>nul
        curl -L -o jar\3rd\baksmali-2.5.2.jar https://repo1.maven.org/maven2/org/smali/baksmali/2.5.2/baksmali-2.5.2.jar
        curl -L -o jar\3rd\apktool_2.4.1.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.4.1/apktool_2.4.1.jar

    - name: Generate custom spider jar
      run: |
        cd jar
        .\genJar.bat
      shell: cmd

    - name: Upload custom_spider.jar
      uses: actions/upload-artifact@v4
      with:
        name: custom_spider_jar
        path: jar/custom_spider.jar
        retention-days: 30

    - name: Upload MD5 checksum
      uses: actions/upload-artifact@v4
      with:
        name: custom_spider_md5
        path: jar/custom_spider.jar.md5
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          jar/custom_spider.jar
          jar/custom_spider.jar.md5
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
